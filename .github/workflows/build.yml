name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt6 opencv-python scikit-image scipy numpy openpyxl Pillow torch torchvision segment-anything

      - name: Download SAM model
        run: |
          New-Item -ItemType Directory -Force -Path models
          Invoke-WebRequest -Uri "https://dl.fbaipublicfiles.com/segment_anything/sam_vit_b_01ec64.pth" -OutFile "models/sam_vit_b_01ec64.pth"

      - name: Generate icon
        run: |
          python -c "
          from PIL import Image, ImageDraw
          import os
          os.makedirs('resources', exist_ok=True)
          img = Image.new('RGBA', (256,256), (26,43,74,255))
          draw = ImageDraw.Draw(img)
          draw.ellipse([30,30,226,226], fill=(0,140,200,255))
          draw.ellipse([80,80,176,176], fill=(26,43,74,255))
          draw.rectangle([118,60,138,196], fill=(255,255,255,255))
          draw.rectangle([60,118,196,138], fill=(255,255,255,255))
          img.save('resources/icon.ico', format='ICO', sizes=[(256,256),(64,64),(32,32),(16,16)])
          "

      - name: Build with PyInstaller
        run: pyinstaller grain_analyzer.spec --clean --noconfirm

      - name: Install NSIS
        run: choco install nsis -y

      - name: Add NSIS to PATH
        run: echo "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Generate NSIS script
        run: python create_nsis_script.py

      - name: Create installer
        run: |
          & "C:\Program Files (x86)\NSIS\makensis.exe" installer.nsi

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: GrainAnalyzer_Setup.exe

      - name: Upload artifact (manual runs)
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: GrainAnalyzer-Windows-Setup
          path: GrainAnalyzer_Setup.exe
          retention-days: 7

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt6 opencv-python scikit-image scipy numpy openpyxl Pillow torch torchvision segment-anything

      - name: Download SAM model
        run: |
          mkdir -p models
          curl -L -o models/sam_vit_b_01ec64.pth https://dl.fbaipublicfiles.com/segment_anything/sam_vit_b_01ec64.pth

      - name: Generate icon
        run: |
          python -c "
          from PIL import Image, ImageDraw
          import os
          os.makedirs('resources', exist_ok=True)
          img = Image.new('RGBA', (512,512), (26,43,74,255))
          draw = ImageDraw.Draw(img)
          draw.ellipse([60,60,452,452], fill=(0,140,200,255))
          draw.ellipse([140,140,372,372], fill=(26,43,74,255))
          draw.rectangle([236,80,276,432], fill=(255,255,255,255))
          draw.rectangle([80,236,432,276], fill=(255,255,255,255))
          img.save('resources/icon.icns')
          img.save('resources/icon.ico')
          "

      - name: Build with PyInstaller
        run: pyinstaller grain_analyzer.spec --clean --noconfirm

      - name: Create DMG
        run: hdiutil create -volname "Grain Analyzer" -srcfolder "dist/GrainAnalyzer.app" -ov -format UDZO GrainAnalyzer.dmg

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: GrainAnalyzer.dmg

      - name: Upload artifact (manual runs)
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: GrainAnalyzer-macOS-DMG
          path: GrainAnalyzer.dmg
          retention-days: 7
